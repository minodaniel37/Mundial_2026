<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quiniela Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1F15; --panel:#10301F; --panel2:#0E2819;
  --line:rgba(242,239,230,.14); --chalk:#F2EFE6; --muted:#9DB4A5;
  --gold:#E8B23A; --green:#37C978; --red:#D84B4B;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--chalk);font-family:'Archivo',-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding-bottom:24px}
header{padding:16px 16px 12px;border-bottom:1px solid var(--line);
  background:radial-gradient(120% 140% at 50% -40%, rgba(232,178,58,.12), transparent 60%),var(--bg)}
.kicker{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700}
h1{font-family:'Archivo Black','Archivo',sans-serif;font-size:clamp(24px,7vw,34px);line-height:1.02;margin-top:4px}
h1 span{color:var(--gold)}
.who{font-size:12.5px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.who b{color:var(--chalk)}
.who button{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:4px 10px;font-size:11px}

/* tabs principales */
.tabs{display:flex;border-bottom:1px solid var(--line);background:rgba(11,31,21,.95);position:sticky;top:0;z-index:11}
.tab{flex:1;padding:13px 4px;text-align:center;font-weight:700;font-size:13px;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

nav{position:sticky;top:46px;z-index:10;background:rgba(11,31,21,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);display:flex;gap:6px;overflow-x:auto;padding:10px 12px;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;min-width:44px;height:36px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);
  color:var(--chalk);font-family:'Archivo Black','Archivo',sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;padding:0 10px;cursor:pointer}
.chip.done::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:5px}
.chip.active{background:var(--gold);color:#1d1604;border-color:var(--gold)}

main{padding:14px 12px 0;max-width:560px;margin:0 auto}
.note{font-size:12px;color:var(--muted);line-height:1.5;margin:2px 2px 12px}
.note b{color:var(--gold)}

.group-head{position:relative;padding:6px 2px 10px;overflow:hidden}
.group-head .big{position:absolute;right:-6px;top:-26px;font-family:'Archivo Black',sans-serif;font-size:96px;color:rgba(242,239,230,.05);pointer-events:none}
.group-head h2{font-family:'Archivo Black',sans-serif;font-size:20px}
.group-head h2 em{font-style:normal;color:var(--gold)}
.group-head p{font-size:12px;color:var(--muted);margin-top:2px}

.standings{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:13px}
.standings th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:8px 4px;border-bottom:1px solid var(--line)}
.standings td{padding:9px 4px;text-align:center;border-bottom:1px solid rgba(242,239,230,.06)}
.standings tr:last-child td{border-bottom:none}
.standings .tl{text-align:left;padding-left:10px;white-space:nowrap}
.standings .fl{font-size:17px;margin-right:6px;vertical-align:-1px}
.standings .pts{font-weight:700;color:var(--gold)}
.standings tr.q1 td:first-child,.standings tr.q2 td:first-child{box-shadow:inset 3px 0 0 var(--green)}
.standings tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--gold)}
.standings tr.me td{background:rgba(232,178,58,.08)}

.jornada-label{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:18px 2px 8px;display:flex;align-items:center;gap:10px}
.jornada-label::after{content:'';flex:1;border-top:1px dashed var(--line)}
.match{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.match.locked{opacity:.95;border-color:rgba(232,178,58,.3)}
.match-meta{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-bottom:8px;gap:8px}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.team{display:flex;align-items:center;gap:7px;min-width:0}
.team.away{justify-content:flex-end;text-align:right}
.team .fl{font-size:24px;line-height:1;flex-shrink:0}
.team .nm{font-size:13.5px;font-weight:600;line-height:1.15;overflow:hidden;text-overflow:ellipsis}
.score{display:flex;align-items:center;gap:5px}
.score input{width:42px;height:44px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--chalk);
  font-family:'Archivo Black','Archivo',sans-serif;font-size:18px;text-align:center;-moz-appearance:textfield}
.score input::-webkit-outer-spin-button,.score input::-webkit-inner-spin-button{-webkit-appearance:none}
.score input:focus{outline:none;border-color:var(--gold);background:#15402a}
.score input.filled{border-color:rgba(55,201,120,.45)}
.score input:disabled{opacity:.55}
.score .dash{color:var(--muted);font-weight:700}
.match-foot{margin-top:7px;font-size:11px;display:flex;justify-content:space-between;color:var(--muted)}
.pt-exact{color:var(--green);font-weight:700}
.pt-hit{color:var(--gold);font-weight:700}
.pt-miss{color:var(--red)}

.savebar{position:sticky;bottom:0;padding:10px 0 14px;background:linear-gradient(transparent,var(--bg) 30%)}
.btn{width:100%;height:48px;border-radius:12px;border:none;font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;cursor:pointer;background:var(--gold);color:#1d1604}
.btn:disabled{opacity:.6}
.btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--chalk)}

/* ranking */
.rank-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.rank-card .pos{font-family:'Archivo Black',sans-serif;font-size:20px;width:34px;text-align:center;color:var(--muted)}
.rank-card.top1 .pos{color:var(--gold)}
.rank-card .info{flex:1;min-width:0}
.rank-card .nm{font-weight:700;font-size:15px}
.rank-card .det{font-size:11px;color:var(--muted);margin-top:2px}
.rank-card .tot{font-family:'Archivo Black',sans-serif;font-size:22px;color:var(--gold)}
.rank-card.me{border-color:var(--gold)}

/* login */
.overlay{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px}
.login{width:100%;max-width:380px}
.login .field{margin-top:14px}
.login label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
.login input{width:100%;margin-top:6px;height:50px;background:var(--panel);border:1px solid var(--line);border-radius:12px;color:var(--chalk);font-size:16px;padding:0 14px;font-family:'Archivo',sans-serif}
.login input:focus{outline:none;border-color:var(--gold)}
.login .err{color:var(--red);font-size:12.5px;margin-top:10px;min-height:16px}
.login .btn{margin-top:16px}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--green);color:var(--chalk);
  padding:10px 18px;border-radius:99px;font-size:13px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media (min-width:560px){.team .nm{font-size:14.5px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="overlay" id="loginView">
  <div class="login">
    <div class="kicker">Copa Mundial FIFA 2026</div>
    <h1 style="margin-bottom:4px">QUINIELA <span>ENTRE AMIGOS</span></h1>
    <p class="note">Entra con tu nombre y un NIP de 4 dígitos. Si es tu primera vez, se crea tu quiniela; si ya jugaste, recuperas tus pronósticos.</p>
    <div class="field"><label>Tu nombre</label><input id="inName" maxlength="24" placeholder="Ej. Daniel"></div>
    <div class="field"><label>NIP (4 dígitos)</label><input id="inPin" inputmode="numeric" maxlength="4" placeholder="••••" type="password"></div>
    <div class="err" id="loginErr"></div>
    <button class="btn" id="btnLogin">Entrar</button>
  </div>
</div>

<header>
  <div class="kicker">Copa Mundial FIFA · México · EUA · Canadá</div>
  <h1>QUINIELA <span>2026</span></h1>

    <span style="display:flex;gap:6px">
      <button id="btnAdmin">Modo admin</button>
      <button id="btnLogout">Salir</button>
    </span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-t="preds">Mi quiniela</div>
  <div class="tab" data-t="rank">Ranking</div>
  <div class="tab" data-t="results">Resultados</div>

const PTS_EXACT = 2, PTS_HIT = 1;

/* ================= ESTADO ================= */
let session = null;            // {name, pin}
let adminPin = null;           // si está activo el modo admin
let state = { players: [], results: {} };
let myPreds = {};              // copia local editable
let dirty = {};                // cambios sin guardar
let tab = 'preds', activeG = 'A';

const $=s=>document.querySelector(s);
const matchesOf=g=>MATCHES.filter(m=>m[1]===g);
const outcome=s=>s[0]>s[1]?'H':(s[0]<s[1]?'A':'E');

function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

async function api(url,body){
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(j.error||'Error de conexión');
  return j;
}
async function refresh(){
  try{
    const r=await fetch('/api/state'); state=await r.json();
    if(session){
      const me=state.players.find(p=>p.name===session.name);
      if(me) myPreds={...me.preds,...collectDirty()};
    }
  }catch(e){}
}
function collectDirty(){const o={};for(const k in dirty)o[k]=dirty[k];return o}

/* ================= PUNTOS ================= */
function pointsFor(preds){
  let total=0,exact=0,hit=0,played=0;
  for(const [id,res] of Object.entries(state.results)){
    const p=preds[id]; if(!p) continue;
    played++;
    if(p[0]===res[0]&&p[1]===res[1]){total+=PTS_EXACT;exact++;}
    else if(outcome(p)===outcome(res)){total+=PTS_HIT;hit++;}
  }
  return {total,exact,hit,played};
}

/* ================= RENDER ================= */
function renderNav(){
  if(tab==='rank'){$('#nav').style.display='none';return}
  $('#nav').style.display='flex';
  const src = tab==='results' ? state.results : myPreds;
  $('#nav').innerHTML=Object.keys(GROUPS).map(g=>{
    const done=matchesOf(g).every(m=>src[m[0]]);
    return `<button class="chip ${g===activeG?'active':''} ${done?'done':''}" data-g="${g}">${g}</button>`;
  }).join('');
  $('#nav').querySelectorAll('.chip').forEach(b=>b.onclick=()=>{activeG=b.dataset.g;render()});
}

function matchCard(m, src, editable, showPts){
  const [id,,,d,t,h,a,v]=m;
  const s=src[id]||['',''];

  const res = state.results[id];
  let foot='';

    const p=src[id];
    let badge='<span class="pt-miss">Sin pronóstico · 0 pts</span>';
    if(p){
      if(p[0]===res[0]&&p[1]===res[1]) badge=`<span class="pt-exact">⚽ ¡Marcador exacto! +${PTS_EXACT} pts</span>`;
      else if(outcome(p)===outcome(res)) badge=`<span class="pt-hit">✓ Atinaste G/E/P +${PTS_HIT} pt</span>`;
      else badge='<span class="pt-miss">✗ Fallaste · 0 pts</span>';
    }
    foot=`<div class="match-foot"><span>Oficial: <b>${res[0]} – ${res[1]}</b></span>${badge}</div>`;
  }
  const dis = (!editable||locked)?'disabled':'';
  return `<div class="match ${locked?'locked':''}">
    <div class="match-meta"><span>${d} · ${t} h</span><span>${v}</span></div>
    <div class="match-row">
      <div class="team"><span class="fl">${TEAMS[h][1]}</span><span class="nm">${TEAMS[h][0]}</span></div>
      <div class="score">
        <input type="number" inputmode="numeric" min="0" max="99" value="${s[0]??''}" class="${s[0]!==''&&s[0]!==undefined?'filled':''}" data-id="${id}" data-side="0" ${dis}>
        <span class="dash">–</span>
        <input type="number" inputmode="numeric" min="0" max="99" value="${s[1]??''}" class="${s[1]!==''&&s[1]!==undefined?'filled':''}" data-id="${id}" data-side="1" ${dis}>
      </div>
      <div class="team away"><span class="nm">${TEAMS[a][0]}</span><span class="fl">${TEAMS[a][1]}</span></div>
    </div>${foot}</div>`;
}

function renderGroupView(src, editable, noteHTML, saveLabel){
  const g=activeG, ms=matchesOf(g);
  let html=noteHTML+`<div class="group-head"><div class="big">${g}</div><h2>GRUPO <em>${g}</em></h2></div>`;
  [1,2,3].forEach(j=>{
    html+=`<div class="jornada-label">${J[j]}</div>`;
    ms.filter(m=>m[2]===j).forEach(m=>html+=matchCard(m,src,editable));
  });
  if(editable) html+=`<div class="savebar"><button class="btn" id="btnSave">${saveLabel}</button></div>`;
  $('#main').innerHTML=html;
  $('#main').querySelectorAll('input:not([disabled])').forEach(inp=>inp.addEventListener('input',onScore));
  const bs=$('#btnSave'); if(bs) bs.onclick=tab==='preds'?savePreds:saveResults;
}

function renderRank(){
  $('#main').innerHTML='';
  const ranked=state.players.map(p=>({name:p.name,...pointsFor(p.preds)}))
    .sort((a,b)=>b.total-a.total||b.exact-a.exact||a.name.localeCompare(b.name));
  const played=Object.keys(state.results).length;
  let html=`<p class="note">🏆 <b>Marcador exacto = ${PTS_EXACT} pts</b> · <b>Atinar G/E/P = ${PTS_HIT} pt</b> · Máx. 144 pts. Partidos calificados: <b>${played} / 72</b>.</p>`;
  if(!ranked.length) html+=`<p class="note">Todavía no hay jugadores registrados. ¡Comparte el link con tus amigos!</p>`;
  ranked.forEach((r,i)=>{
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
    const maxPts = played * PTS_EXACT;
    const pct = maxPts > 0 ? Math.round(r.total/maxPts*100) : 0;
    html+=`<div class="rank-card ${i===0?'top1':''} ${session&&r.name===session.name?'me':''}">
      <div class="pos">${medal}</div>
      <div class="info">
        <div class="nm">${r.name}${session&&r.name===session.name?' <span style="font-size:10px;color:var(--gold)">· tú</span>':''}</div>
        <div class="det">⚽ ${r.exact} exactos · ✓ ${r.hit} G/E/P · ${r.played} calificados</div>
        <div style="margin-top:6px;height:4px;background:var(--panel2);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold),#F5D78A);border-radius:99px;transition:width .4s"></div>
        </div>
      </div>
      <div class="tot">${r.total}<span style="font-size:11px;color:var(--muted);font-family:'Archivo',sans-serif;font-weight:400"> pts</span></div>
    </div>`;
  });
  html+=`<div class="savebar"><button class="btn ghost" id="btnRefresh">↻ Actualizar ranking</button></div>
  <p style="text-align:center;font-size:10.5px;color:var(--muted);margin-top:8px">Se actualiza automáticamente cada 30 seg</p>`;
  $('#main').innerHTML=html;
  $('#btnRefresh').onclick=async()=>{await refresh();render();toast('Ranking actualizado')};
}

function render(){
  renderNav();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.t===tab));
  if(tab==='rank') return renderRank();
  if(tab==='preds')
    return renderGroupView(myPreds,true,
      `<p class="note">Captura <b>tus pronósticos</b>. Se bloquean en cuanto el admin registra el resultado oficial de cada partido.</p>`,
      'Guardar mis pronósticos');
  // resultados
  const editable=!!adminPin;
  renderGroupView(state.results,editable,
    editable?`<p class="note"><b>Modo admin activo:</b> los marcadores que captures aquí son los <b>resultados oficiales</b> y califican a todos.</p>`
            :`<p class="note">Resultados oficiales capturados por el administrador. Si tú administras la quiniela, toca <b>Modo admin</b> arriba.</p>`,
    'Guardar resultados oficiales');
}

function onScore(e){
  const inp=e.target;
  let v=inp.value.replace(/[^0-9]/g,'').slice(0,2);
  inp.value=v;
  const id=inp.dataset.id,side=+inp.dataset.side;
  const store=tab==='preds'?myPreds:state.results;
  if(!store[id])store[id]=['',''];
  store[id]=[...store[id]];store[id][side]=v===''?'':+v;
  if(tab==='preds')dirty[id]=store[id];
  inp.classList.toggle('filled',v!=='');
}

function packComplete(store,ids){
  const out={};
  ids.forEach(id=>{const s=store[id];if(s&&s[0]!==''&&s[1]!==''&&s[0]!==undefined&&s[1]!==undefined)out[id]=[+s[0],+s[1]]});
  return out;
}

async function savePreds(){
  try{
    const preds=packComplete(myPreds,Object.keys(myPreds));
    const r=await api('/api/preds',{name:session.name,pin:session.pin,preds});
    dirty={};
    await refresh();render();
    toast(r.bloqueados?`Guardado · ${r.bloqueados} partido(s) ya estaban cerrados`:'Pronósticos guardados ✓');
  }catch(e){toast(e.message)}
}
async function saveResults(){
  try{
    const results=packComplete(state.results,MATCHES.map(m=>m[0]));
    await api('/api/results',{adminPin,results});
    await refresh();render();
    toast('Resultados oficiales guardados ✓');
  }catch(e){toast(e.message)}
}

/* ================= SESIÓN ================= */
function showApp(){$('#loginView').style.display='none';$('#whoName').textContent=session.name}
$('#btnLogin').onclick=async()=>{
  const name=$('#inName').value.trim(),pin=$('#inPin').value.trim();
  $('#loginErr').textContent='';
  try{
    const r=await api('/api/login',{name,pin});
    session={name:r.name,pin};
    localStorage.setItem('quiniela-session',JSON.stringify(session));
    await refresh();
    const me=state.players.find(p=>p.name===session.name);
    myPreds=me?{...me.preds}:{};
    showApp();render();
    toast(r.nuevo?'¡Bienvenido a la quiniela!':'Qué bueno verte de nuevo');
  }catch(e){$('#loginErr').textContent=e.message}
};
$('#btnLogout').onclick=()=>{localStorage.removeItem('quiniela-session');location.reload()};
$('#btnAdmin').onclick=async()=>{
  if(adminPin){adminPin=null;$('#btnAdmin').textContent='Modo admin';render();return}
  const p=prompt('PIN de administrador:');
  if(!p)return;
  const r=await api('/api/admin-check',{adminPin:p});
  if(r.ok){adminPin=p;$('#btnAdmin').textContent='Salir de admin';tab='results';render();toast('Modo admin activo')}
  else toast('PIN incorrecto');
};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{tab=t.dataset.t;render()});

(async function init(){
  const saved=localStorage.getItem('quiniela-session');
  await refresh();
  if(saved){
    try{
      session=JSON.parse(saved);
      const r=await api('/api/login',{name:session.name,pin:session.pin});
      const me=state.players.find(p=>p.name===session.name);
      myPreds=me?{...me.preds}:{};
      showApp();
    }catch(e){session=null;localStorage.removeItem('quiniela-session')}
  }
  render();
  setInterval(async()=>{await refresh();if(tab==='rank')render();},30000);
})();
</script>
</body>
